<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kids Semantic Network Demo</title>

  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" />

  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f5f5f5;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    /* Keep jsPsych's default page structure simple */
    #jspsych-target,
    .jspsych-display-element {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Only generic task element styles here.
       Do NOT put fixed layout styles for #grid-container, #task-instructions, etc.
       Those should be created by experiment.js */
    .stim-img {
      position: absolute;
      object-fit: contain;
      transform: translate(-50%, -50%);
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
    }

    .stim-img.dragging {
      z-index: 9999;
    }

    .grid-line-v,
    .grid-line-h {
      position: absolute;
      background: #cfcfcf;
      pointer-events: none;
    }

    .task-btn {
      font-family: Arial, sans-serif;
      background: white;
      border: 1px solid #888;
      border-radius: 12px;
      cursor: pointer;
    }

    .task-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div id="jspsych-target"></div>
  <script src="experiment.js?v=1"></script>
</body>
</html>
