<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" />

  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="jspsych/plugin-html-button-response.js"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@1.2.1"></script>


  <style>
    body {
      margin: 0;
      background: white;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #task-wrapper {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: white;
      overflow: hidden;
    }

  #trial-label {
    position: absolute;
    top: 16px;
    left: 16px;
    font-size: 22px;
    background: rgba(255,255,255,0.95);
    padding: 8px 12px;
    border: 1px solid #ccc;
    z-index: 10000;
  }

  #task-instructions {
    position: absolute;
    top: 70px;
    left: 16px;
    width: 220px;
    font-size: 16px;
    background: rgba(255,255,255,0.95);
    padding: 10px 12px;
    border: 1px solid #ccc;
    z-index: 10000;
    line-height: 1.35;
  }

  #grid-container {
    position: absolute;
    left: 280px;
    top: 30px;
    width: 900px;
    height: 540px;
    border: 2px solid black;
    background: white;
    box-sizing: border-box;
    overflow: visible;
  }

    #warning-text {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: red;
      background: rgba(255,255,255,0.95);
      padding: 8px 12px;
      z-index: 10000;
      min-height: 30px;
    }

  .stim-img {
    position: absolute;
    width: 80px;
    height: 80px;
    transform: translate(-50%, -50%);
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
    touch-action: none;
    z-index: 100;
  }

  .stim-img.dragging {
    width: 120px;
    height: 120px;
    cursor: grabbing;
    z-index: 9999;
  }

    .grid-line-v, .grid-line-h {
      position: absolute;
      background: black;
      pointer-events: none;
    }

    .grid-line-v {
      width: 2px;
      height: 100%;
      top: 0;
    }

    .grid-line-h {
      height: 2px;
      width: 100%;
      left: 0;
    }
  </style>
</head>
<body>
  <script src="experiment.js"></script>
</body>
</html>
