<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>Kids Semantic Network Demo</title>

  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" />

  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #jspsych-target {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #f5f5f5;
    }

    .jspsych-display-element {
      width: 100%;
      height: 100%;
      overflow: hidden !important;
    }

    .jspsych-content-wrapper {
      width: 100%;
      height: 100%;
      overflow: hidden !important;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .jspsych-content {
      width: 100%;
      height: 100%;
      max-width: none !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stim-img {
      position: absolute;
      object-fit: contain;
      transform: translate(-50%, -50%);
      touch-action: none;
      -webkit-user-drag: none;
      user-select: none;
    }

    .stim-img.dragging {
      z-index: 9999;
    }

    .grid-line-v,
    .grid-line-h {
      position: absolute;
      background: #cfcfcf;
      pointer-events: none;
    }

    .task-btn {
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #888;
      background: white;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="jspsych-target"></div>
  <script src="experiment.js?v=31"></script>
</body>
</html>
